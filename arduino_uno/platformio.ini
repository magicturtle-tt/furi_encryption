; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = uno
src_dir = src

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
build_src_filter =
  +<*>
  -<include/>
  -<include/**>
build_flags =
  -Isrc/include/block-ciphers/include
  -Isrc/include/libtomcrypt/src/headers
  ; Toggle per-algorithm benchmarks for UNO size limits.
  ; Set to 1 to include, 0 to exclude.
  -DENABLE_TINYAES_EXP=1
  -DENABLE_TEA_EXP=1
  -DENABLE_SIMECK_EXP=1
  -DENABLE_SIMON_EXP=1
  -DENABLE_SPECK_EXP=1
  -DENABLE_LEA_EXP=0
  -DENABLE_HIGHT_EXP=0
  -DENABLE_SEED_EXP=0
  -DENABLE_RC5_EXP=0
  -DENABLE_TWOFISH_EXP=0
lib_deps = rweather/Crypto@^0.4.0
